<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemio ERP 自然語言查詢</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
  <style>
    body { background: #f4f6fb; }

    /* ── 1. Header ─────────────────────────────────── */
    .app-header {
      background: linear-gradient(135deg, #1a3c6e 0%, #2e6fc4 100%);
      color: #fff;
      padding: 1.1rem 2rem;
    }
    .app-header h1 { font-size: 1.6rem; margin: 0; letter-spacing: .04em; }
    .app-header small { opacity: .75; font-size: .85rem; }

    /* ── result grid ───────────────────────────────── */
    .result-table-wrap { max-height: 420px; overflow-y: auto; }
    .result-table thead th {
      position: sticky; top: 0;
      background: #1a3c6e; color: #fff;
      white-space: nowrap;
    }
    .result-table tfoot td {
      background: #e8f0fe; font-weight: 700;
    }
    .num-cell { text-align: right; }

    /* ── SQL box ───────────────────────────────────── */
    #sql-box {
      background: #1e1e2e; color: #cdd6f4;
      border-radius: .5rem; padding: 1rem;
      font-family: "Consolas", monospace;
      font-size: .88rem; white-space: pre-wrap;
      word-break: break-all; min-height: 3rem;
    }

    /* ── table list ────────────────────────────────── */
    #table-list { max-height: 340px; overflow-y: auto; }
    #table-list .list-group-item {
      padding: .3rem .75rem;
      font-size: .82rem;
      cursor: default;
    }

    /* ── loading overlay ───────────────────────────── */
    #loading-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #fff;
    }
    #loading-overlay .spinner-border { width: 3.5rem; height: 3.5rem; }
  </style>
</head>
<body>

<!-- ══ 1. HEADER ════════════════════════════════════════════════════════════ -->
<div class="app-header d-flex align-items-center gap-3">
  <i class="bi bi-database-fill-gear fs-2"></i>
  <div>
    <h1>Gemio ERP 自然語言查詢</h1>
    <small>輸入中文問題，AI 自動產生 SQL 並回傳結果</small>
  </div>
</div>

<div class="container-fluid py-3 px-4">
  <div class="row g-3">

    <!-- ── 左側主區域 ─────────────────────────────── -->
    <div class="col-lg-9">

      <!-- ══ 2. INPUT ══════════════════════════════════════════════════════ -->
      <div class="card shadow-sm mb-3">
        <div class="card-body">
          <form id="query-form">
            <label class="form-label fw-semibold">
              <i class="bi bi-chat-left-text-fill text-primary me-1"></i>
              請輸入查詢問題
            </label>
            <div class="input-group">
              <input
                id="question-input"
                name="question"
                type="text"
                class="form-control form-control-lg"
                placeholder="例如：列出所有採購編號與採購日期"
                required
                autocomplete="off"
              />
              <button class="btn btn-primary btn-lg px-4" type="submit">
                <i class="bi bi-search me-1"></i> 查詢
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- ══ 3. RESULTS ════════════════════════════════════════════════════ -->
      <div class="card shadow-sm mb-3">
        <div class="card-header d-flex align-items-center justify-content-between">
          <span class="fw-semibold">
            <i class="bi bi-table text-success me-1"></i>查詢結果
            <span id="row-count" class="text-muted fs-6"></span>
          </span>
          <button
            id="export-btn"
            class="btn btn-outline-success btn-sm d-none"
            onclick="exportExcel()"
          >
            <i class="bi bi-file-earmark-excel-fill me-1"></i>匯出 Excel
          </button>
        </div>
        <div class="card-body p-0">
          <div id="error-alert" class="alert alert-danger m-3 d-none"></div>
          <div class="result-table-wrap">
            <table id="result-table" class="table table-bordered table-hover result-table mb-0 d-none">
              <thead id="result-thead"></thead>
              <tbody id="result-tbody"></tbody>
              <tfoot id="result-tfoot"></tfoot>
            </table>
            <div id="empty-msg" class="text-center text-muted py-5 fs-5">
              尚無查詢結果
            </div>
          </div>
        </div>
      </div>

      <!-- ══ 4. SQL STATEMENT ══════════════════════════════════════════════ -->
      <div class="card shadow-sm">
        <div class="card-header fw-semibold">
          <i class="bi bi-code-slash text-warning me-1"></i>產生的 SQL 語句
        </div>
        <div class="card-body p-2">
          <div id="sql-box">（尚未查詢）</div>
        </div>
      </div>

    </div><!-- /col-lg-9 -->

    <!-- ── 右側：可查詢的表 ───────────────────────── -->
    <!-- ══ 5. TABLE LIST ═════════════════════════════════════════════════════ -->
    <div class="col-lg-3">
      <div class="card shadow-sm h-100">
        <div class="card-header fw-semibold">
          <i class="bi bi-list-ul text-info me-1"></i>可查詢的資料表
        </div>
        <div class="card-body p-0">
          <div id="table-list">
            <ul class="list-group list-group-flush">
              {% for t in tables %}
              <li class="list-group-item list-group-item-action" onclick="fillTable('{{ t }}')">
                <i class="bi bi-table text-secondary me-1"></i>{{ t }}
              </li>
              {% else %}
              <li class="list-group-item text-muted">（無法讀取資料表）</li>
              {% endfor %}
            </ul>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /row -->
</div><!-- /container-fluid -->

<!-- ── Loading Overlay ───────────────────────────────────────────────────── -->
<div id="loading-overlay">
  <div class="spinner-border text-light mb-3" role="status"></div>
  <div class="fs-4 fw-semibold">系統查詢中，請稍候…</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // ── shared state ──────────────────────────────────────────────────────────
  let lastResult = { columns: [], rows: [] };

  // ── helpers ───────────────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);

  function isNumeric(val) {
    return val !== "" && !isNaN(Number(val.replace(/,/g, "")));
  }

  function fmt(val) {
    if (isNumeric(val)) {
      const n = Number(val.replace(/,/g, ""));
      return Number.isInteger(n) ? n.toLocaleString() : n.toLocaleString(undefined, { maximumFractionDigits: 4 });
    }
    return val;
  }

  function showLoading(on) {
    $("loading-overlay").style.display = on ? "flex" : "none";
  }

  function fillTable(name) {
    $("question-input").value = "列出 " + name + " 的前 100 筆資料";
    $("question-input").focus();
  }

  // ── render results ────────────────────────────────────────────────────────
  function renderResults(data) {
    const { error, sql, columns, rows } = data;

    // SQL box
    $("sql-box").textContent = sql || "（無）";

    // Error
    if (error) {
      $("error-alert").textContent = "錯誤：" + error;
      $("error-alert").classList.remove("d-none");
      $("result-table").classList.add("d-none");
      $("empty-msg").classList.remove("d-none");
      $("export-btn").classList.add("d-none");
      $("row-count").textContent = "";
      return;
    }

    $("error-alert").classList.add("d-none");
    lastResult = { columns, rows };

    if (!columns.length) {
      $("result-table").classList.add("d-none");
      $("empty-msg").textContent = "查詢成功，但無資料";
      $("empty-msg").classList.remove("d-none");
      $("export-btn").classList.add("d-none");
      $("row-count").textContent = "";
      return;
    }

    // Detect numeric columns
    const numCols = columns.map((_, ci) =>
      rows.length > 0 && rows.slice(0, 20).every(r => r[ci] === "" || isNumeric(r[ci]))
    );

    // Header
    const thead = $("result-thead");
    thead.innerHTML = "<tr>" + columns.map(c => `<th>${c}</th>`).join("") + "</tr>";

    // Body
    const tbody = $("result-tbody");
    tbody.innerHTML = rows.map(row =>
      "<tr>" + row.map((v, ci) =>
        `<td class="${numCols[ci] ? "num-cell" : ""}">${fmt(v)}</td>`
      ).join("") + "</tr>"
    ).join("");

    // Footer: sum numeric columns
    const hasSums = numCols.some(Boolean);
    const tfoot = $("result-tfoot");
    if (hasSums) {
      const sums = columns.map((_, ci) => {
        if (!numCols[ci]) return "";
        const s = rows.reduce((acc, r) => acc + (r[ci] === "" ? 0 : Number(r[ci].replace(/,/g, ""))), 0);
        return s;
      });
      tfoot.innerHTML = "<tr>" + sums.map((s, ci) =>
        `<td class="${numCols[ci] ? "num-cell" : ""}">${s !== "" ? fmt(String(s)) : ""}</td>`
      ).join("") + "</tr>";
    } else {
      tfoot.innerHTML = "";
    }

    $("result-table").classList.remove("d-none");
    $("empty-msg").classList.add("d-none");
    $("export-btn").classList.remove("d-none");
    $("row-count").textContent = ` （共 ${rows.length} 筆）`;
  }

  // ── form submit ───────────────────────────────────────────────────────────
  $("query-form").addEventListener("submit", async e => {
    e.preventDefault();
    showLoading(true);
    try {
      const fd = new FormData($("query-form"));
      const res = await fetch("/query", { method: "POST", body: fd });
      const data = await res.json();
      renderResults(data);
    } catch (err) {
      renderResults({ error: err.message, sql: "", columns: [], rows: [] });
    } finally {
      showLoading(false);
    }
  });

  // ── excel export ──────────────────────────────────────────────────────────
  async function exportExcel() {
    const res = await fetch("/export-excel", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(lastResult),
    });
    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = "query_result.xlsx";
    a.click();
    URL.revokeObjectURL(url);
  }
</script>
</body>
</html>
